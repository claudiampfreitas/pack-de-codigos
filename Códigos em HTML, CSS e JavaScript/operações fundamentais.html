<html>
<head>
<title>JavaScript</title>
</head>
<body>
<script language="JavaScript">
	var num1=window.prompt("Digite um número");
    num2=window.prompt("Digite outro número");
soma=parseInt(num1)+parseInt(num2);
alert("A soma dos números "+num1+"+"+num2+"="+soma);
document.write("A soma dos números "+num1+"+"+num2+"="+soma+"<br />");
subt=(num1)-(num2);
alert("A subtração dos números "+num1+"-"+num2+"="+subt);
document.write("A subtração dos números "+num1+"-"+num2+"="+subt+"<br />");
multi=(num1)*(num2);
alert("A multiplicação dos números "+num1+"*"+num2+"="+multi);
document.write("A multiplicação dos números "+num1+"*"+num2+"="+multi+"<br />");
divi=(num1)/(num2);
alert("A divisão dos números "+num1+"/"+num2+"="+divi);
document.write("A divisão dos números "+num1+"/"+num2+"="+divi+"<br />");
</script>
</body>
</html>
