<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css" />
    <title>Breakout Game</title>
  </head>
  <body>
    <h1>Jogo de quebra-cabeça <br> FACULDADE DE TI DE CAMBRIDGE</h1>
    <button id="rules-btn" class="btn rules-btn">Mostrar as regras</button>
    <div id="rules" class="rules">
      <h2>Como jogar:</h2>
      <p>
        Use as teclas direita e esquerda para mover a raquete para quicar a bola
        e quebrar os blocos.
      </p>
      <p>Se você errar a bola, sua pontuação e os bloqueios serão redefinidos.</p>
      <button id="close-btn" class="btn">Fechar</button>
    </div>

    <canvas id="canvas" width="800" height="600"></canvas>

    <script src="script.js"></script>
  </body>
</html>
