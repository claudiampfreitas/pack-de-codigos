<html>
<head>
<title>JavaScript</title>
</head>
<body>
<script language="JavaScript">
	var num1=window.prompt("Digite um número");
    num2=window.prompt("Digite outro número");
soma1=parseFloat(num1)+parseFloat(num2);
alert("A soma das notas do primeiro bimestre "+num1+"+"+num2+"="+soma1);
document.write("A soma das notas do primeiro bimestre "+num1+"+"+num2+"="+soma1+"<br />");
var num3=window.prompt("Digite um número");
    num4=window.prompt("Digite outro número");
soma2=parseFloat(num3)+parseFloat(num4);
alert("A soma das notas do segundo bimestre "+num3+"+"+num4+"="+soma2);
document.write("A soma das notas do segundo bimestre "+num3+"+"+num4+"="+soma2+"<br />");
somafinal=parseFloat(soma1)+parseFloat(soma2);
alert("A soma final "+soma1+"+"+soma2+"="+somafinal);
document.write("A soma final "+soma1+"+"+soma2+"="+somafinal+"<br />");
media=(soma1+soma2)/2;
alert("A média dos dois bimestres "+soma1+"+"+soma2+"/"+2+"="+media);
document.write("A média dos dois bimestres "+soma1+"+"+soma2+"/"+2+"="+media+"<br />");
</script>
</body>
</html>
