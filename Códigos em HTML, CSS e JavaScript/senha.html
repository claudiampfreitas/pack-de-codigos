<html>
<head>
<title>JavaScript</title>
</head>
<body>
<script language="JavaScript">
var senha=window.prompt("Digite uma senha");
confirm=window.prompt("Confirme a senha");
if (senha==confirm)
{
alert("Sua senha está correta");
}
else
{
alert("Sua senha está incorreta. Redigite");
var redig=window.prompt("Redigite sua senha");
if (senha==redig)
{
alert("Sua senha está correta");
}
else
{
alert("Sua senha está incorreta!!");
}
}
</script>
</body>
</html>
