<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Testando as cores</title>
<style type="text/css">
h3
{margin:20px;
color:#000000;
font-family:arial;
font-weight:bold;
font-size:30px;}
</style>
</head>
<body>
<center><h3>Clique em um dos botões para alterar a cor da sua página</h3></center>
<form>
<input type="button" name="btazul" value="Azul" onclick="document.bgColor=('DeepSkyBlue')" />&nbsp;&nbsp;
<input type="button" name="btamarelo" value="Amarelo" onclick="document.bgColor=('Gold')" />&nbsp;&nbsp;
<input type="button" name="btrosa" value="Rosa" onclick="document.bgColor=('Violet')" />&nbsp;&nbsp;
<input type="button" name="btverde" value="Verde" onclick="document.bgColor=('LimeGreen')" />&nbsp;&nbsp;
<input type="button" name="btvermelho" value="Vermelho" onclick="document.bgColor=('Salmon')" />&nbsp;&nbsp;
<input type="button" name="btcinza" value="Cinza" onclick="document.bgColor=('Silver')" />&nbsp;&nbsp;
</form>
</body>
</html>
