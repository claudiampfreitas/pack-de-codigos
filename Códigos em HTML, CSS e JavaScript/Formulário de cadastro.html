<!DOCTYPE html>
<html lang="pt-br">
<head>
<title>Formulário de cadastro</title>
<style type="text/css">
body
{
width:100%;
height:100%;
font-family:arial;
font-size:14px;	
background:linear-gradient(to top, BurlyWood, Wheat);
background-color:#064b31;
scrol-behavior:smooth;}
*{margin: 0;
padding: 0;}

h1, h2, h3, h4, h5, h6
{margin:20px;}

hr
{margin:20px;
height: 5px;
border: 0;
box-shadow: 0 5px 5px -5px #8c8c8c inset;}
	
p
{font-family:arial;
font-size:16px;
margin:20px;
text-align:justify;
padding-left:6px;
padding-right:6px;
color:#000000;}

form, fieldset
{font-family:arial;
padding-left:15px;
font-size:16px;
margin:auto;
text-align:justify;
margin-left:15px;
margin-right:0px;
margin-bottom:5px;
color:#000000;}

textarea
{font-family:arial;
font-size:16px;
margin:auto;
text-align:justify;
margin-left:0px;
margin-right:0px;
margin-bottom:5px;
color:#000000;}
</style>
</head>
<body>
<center><h1><b>Formulário de cadastro</b></h1></center>
<br />
<form>
 <label for="InputNome">Nome:</label>
<Input type="text" id="InputNome" size="50" /><br /><br />
<label for="InputEmail">Email:</label>
<Input type="email" id="InputEmail" size="60" /><br /><br />
<label for="InputCPF">CPF:</label>
<input type="text" id="InputCPF" size="14" placeholder="Ex: xxx.xxx.xxx-xx"/><br /><br />
<label for="InputTelefone">Telefone:</label>
<input type="text" id="InputTelefone" size="15" placeholder="Ex: (xx) xxxxx-xxxx"/><br /><br />
<label for="InputCEP">CEP:</label>
<input type="text" id="InputCEP" size="9" placeholder="Ex: xxxxx-xxx"/><br /><br />
<label for="InputEndereco">Endereço:</label>
<Input type="text" id="InputEndereco" size="70" /><br /><br />
<label for="InputNumero">Nº:</label>
<Input type="text" id="InputNumero" size="4" /><br /><br />
<label for="InputComplemento">Complemento:</label>
<Input type="text" id="InputComplemento" size="10" /><br /><br />
<label for="InputBairro">Bairro:</label>
<Input type="text" id="InputBairro" size="30" /><br /><br />
<label for="InputCidade">Cidade:</label>
<Input type="text" id="InputCidade" size="30" /><br /><br />
<label>Estado:
     <select name="estado">
	 <option value="selecione"> Selecione </option>
	 <option value="acre"> Acre </option>
	 <option value="alagoas"> Alagoas </option>
	 <option value="amapá"> Amapá </option>
	 <option value="amazonas"> Amazonas </option>
	 <option value="bahia"> Bahia </option>
	 <option value="ceará"> Ceará </option>
	 <option value="distritofederal"> Distrito Federal </option>
	 <option value="espíritosanto"> Espírito Santo </option>
	 <option value="goiás"> Goiás </option>
	 <option value="maranhão"> Maranhão </option>
	 <option value="matogrosso"> Mato Grosso </option>
	 <option value="matogrossodosul"> Mato Grosso do Sul </option>
	 <option value="minasgerais"> Minas Gerais </option>
	 <option value="pará"> Pará </option>
	 <option value="paraíba"> Paraíba </option>
	 <option value="paraná"> Paraná </option>
	 <option value="pernambuco"> Pernambuco </option>
	 <option value="piauí"> Piauí </option>
	 <option value="riodejaneiro"> Rio de Janeiro </option>
	 <option value="riograndedonorte"> Rio Grande do Norte </option>
	 <option value="riograndedosul"> Rio Grande do Sul </option>
	 <option value="rondônia"> Rondônia </option>
	 <option value="roraima"> Roraima </option>
	 <option value="santacatarina"> Santa Catarina </option>
	 <option value="sãopaulo"> São Paulo </option>
	 <option value="sergipe"> Sergipe </option>
	 <option value="tocantins"> Tocantins </option>
     </select>
     </label>
	 <br /><br />
<label for="InputPais">País:</label>
<Input type="text" id="InputPais" size="30" /><br />
<br />
<button>Gravar cadastro</button>
<button>Novo cadastro</button>
<button>Ver cadastro</button>
</form>
</body>
</html>
